name: Release

on:
  push:
    tags:
      - 'v*'

env:
  WAILS_CLI_VERSION: v2.12.0

jobs:
  test-go:
    name: Go tests
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Go tests
        run: go test ./...

  build-macos:
    name: macOS (${{ matrix.arch }})
    needs: test-go
    runs-on: macos-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_CLI_VERSION}

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        run: wails build -platform darwin/${{ matrix.goarch }} -o grpc-nimbus -ldflags "-X main.Version=${{ github.ref_name }}"
        env:
          CGO_ENABLED: '1'
          GOARCH: ${{ matrix.goarch }}

      - name: Package .app into zip
        run: |
          cd build/bin
          zip -r ../../grpc-nimbus-${{ github.ref_name }}-darwin-${{ matrix.arch }}.zip "GRPC Nimbus.app"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: grpc-nimbus-darwin-${{ matrix.arch }}
          path: grpc-nimbus-${{ github.ref_name }}-darwin-${{ matrix.arch }}.zip

  build-windows:
    name: Windows (amd64)
    needs: test-go
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${env:WAILS_CLI_VERSION}

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        run: wails build -platform windows/amd64 -o grpc-nimbus.exe -ldflags "-X main.Version=${{ github.ref_name }}"

      - name: Zip binary
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/grpc-nimbus.exe `
            -DestinationPath grpc-nimbus-${{ github.ref_name }}-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: grpc-nimbus-windows-amd64
          path: grpc-nimbus-${{ github.ref_name }}-windows-amd64.zip

  build-linux:
    name: Linux (amd64)
    needs: test-go
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_CLI_VERSION}

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        run: wails build -platform linux/amd64 -o grpc-nimbus -ldflags "-X main.Version=${{ github.ref_name }}"
        env:
          CGO_ENABLED: '1'

      - name: Package binary
        run: |
          tar -czf grpc-nimbus-${{ github.ref_name }}-linux-amd64.tar.gz \
            -C build/bin grpc-nimbus

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: grpc-nimbus-linux-amd64
          path: grpc-nimbus-${{ github.ref_name }}-linux-amd64.tar.gz

  release:
    name: Create GitHub Release
    needs: [test-go, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Extract tag annotation
        id: tag_body
        run: |
          body=$(git tag -l --format='%(contents)' "${{ github.ref_name }}")
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body: ${{ steps.tag_body.outputs.body }}
          files: |
            grpc-nimbus-*.zip
            grpc-nimbus-*.tar.gz
