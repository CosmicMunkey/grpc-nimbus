name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        run: wails build -platform darwin/${{ matrix.goarch }} -o grpc-nimbus
        env:
          CGO_ENABLED: '1'
          GOARCH: ${{ matrix.goarch }}

      - name: Package .app into zip
        run: |
          cd build/bin
          zip -r ../../grpc-nimbus-${{ github.ref_name }}-darwin-${{ matrix.arch }}.zip "GRPC Nimbus.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: grpc-nimbus-darwin-${{ matrix.arch }}
          path: grpc-nimbus-${{ github.ref_name }}-darwin-${{ matrix.arch }}.zip

  build-windows:
    name: Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        run: wails build -platform windows/amd64 -o grpc-nimbus.exe

      - name: Zip binary
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/grpc-nimbus.exe `
            -DestinationPath grpc-nimbus-${{ github.ref_name }}-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: grpc-nimbus-windows-amd64
          path: grpc-nimbus-${{ github.ref_name }}-windows-amd64.zip

  build-linux:
    name: Linux (amd64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        run: wails build -platform linux/amd64 -o grpc-nimbus
        env:
          CGO_ENABLED: '1'

      - name: Package binary
        run: |
          tar -czf grpc-nimbus-${{ github.ref_name }}-linux-amd64.tar.gz \
            -C build/bin grpc-nimbus

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: grpc-nimbus-linux-amd64
          path: grpc-nimbus-${{ github.ref_name }}-linux-amd64.tar.gz

  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            grpc-nimbus-*.zip
            grpc-nimbus-*.tar.gz
