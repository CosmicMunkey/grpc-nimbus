name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        run: wails build -platform darwin/${{ matrix.goarch }} -o grpc-nimbus
        env:
          CGO_ENABLED: '1'
          GOARCH: ${{ matrix.goarch }}

      - name: Package .app into zip
        run: |
          cd build/bin
          zip -r ../../grpc-nimbus-${{ github.ref_name }}-darwin-${{ matrix.arch }}.zip "GRPC Nimbus.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grpc-nimbus-darwin-${{ matrix.arch }}
          path: grpc-nimbus-${{ github.ref_name }}-darwin-${{ matrix.arch }}.zip

  build-windows:
    name: Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        run: wails build -platform windows/amd64 -o grpc-nimbus.exe

      - name: Zip binary
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/grpc-nimbus.exe `
            -DestinationPath grpc-nimbus-${{ github.ref_name }}-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grpc-nimbus-windows-amd64
          path: grpc-nimbus-${{ github.ref_name }}-windows-amd64.zip

  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            grpc-nimbus-*.zip
