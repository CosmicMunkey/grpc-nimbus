syntax = "proto3";

package library.v1;

import "vendor/common/v1/paging.proto";
import "vendor/library/v1/types.proto";

service Library {
  rpc ListBooks(ListBooksRequest) returns (ListBooksResponse);
  rpc WatchShelves(WatchShelvesRequest) returns (stream ShelfEvent);
}

message ListBooksRequest {
  common.v1.PageRequest page = 1;
  LibraryFilter filter = 2;
}

message ListBooksResponse {
  repeated Book books = 1;
  common.v1.PageResponse page = 2;
}

message WatchShelvesRequest {
  repeated string shelf_ids = 1;
}

message ShelfEvent {
  Shelf shelf = 1;
  string event_type = 2;
}
